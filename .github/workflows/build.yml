name: PHP-Check

on:
  push:
    branches:
      - fusionV1-V2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PHP Syntax Checker (Lint)
        uses: StephaneBour/actions-php-lint@8.4
        with:
          dir: "."

      - uses: actions/checkout@v4
      - name: PHP Syntax Checker (Lint)
        uses: StephaneBour/actions-php-lint@8.3
        with:
          dir: "."

      - uses: actions/checkout@v4
      - name: PHP Syntax Checker (Lint)
        uses: StephaneBour/actions-php-lint@8.2
        with:
          dir: "."

      - uses: actions/checkout@v4
      - name: PHP Syntax Checker (Lint)
        uses: StephaneBour/actions-php-lint@7.4
        with:
          dir: "."
